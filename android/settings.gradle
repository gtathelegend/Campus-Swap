pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
    id "com.android.application" version "8.9.1" apply false
    id "org.jetbrains.kotlin.android" version "2.1.0" apply false
}

include ":app"

// Dynamically include Flutter plugins to bypass broken automated detection
def pluginsFile = new File(rootProject.projectDir, "../.flutter-plugins-dependencies")
if (pluginsFile.exists()) {
    def json = new groovy.json.JsonSlurper().parseText(pluginsFile.text)
    json.plugins.android.each { plugin ->
        if (plugin.native_build) {
            include ":${plugin.name}"
            project(":${plugin.name}").projectDir = new File(plugin.path, "android")
        }
    }
}
