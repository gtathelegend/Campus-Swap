plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.campus_swap"
    compileSdkVersion 35

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.example.campus_swap"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 35
        versionCode flutter.versionCode
        versionName flutter.versionName
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // Explicitly add Flutter embedding so FlutterActivity is on the compile classpath.
    // The Flutter Gradle plugin skips this when plugins are present (expects transitive deps),
    // but Android plugins use compileOnly scope so the embedding never propagates to the app.
    debugImplementation "io.flutter:flutter_embedding_debug:1.0.0-425cfb54d01a9472b3e81d9e76fd63a4a44cfbcb"
    profileImplementation "io.flutter:flutter_embedding_profile:1.0.0-425cfb54d01a9472b3e81d9e76fd63a4a44cfbcb"
    releaseImplementation "io.flutter:flutter_embedding_release:1.0.0-425cfb54d01a9472b3e81d9e76fd63a4a44cfbcb"
}
